# Minimal Wrangler configuration to satisfy CI build step
# This file tells Cloudflare Wrangler where the build output is.
# It doesn't run any actual Worker code, just serves the front-end assets.

name = "g97-static"
compatibility_date = "2026-03-06"

[site]
bucket = "frontend/admin/dist"

# no "main" entrypoint because we're not deploying a Worker script
